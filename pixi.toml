[project]
name = "eva"
version = "0.1.4"
description = "Eva Franka Infrastructure - A modular robotics framework built on DROID"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]
requires-python = ">=3.10,<3.11"

#
# To set up the environment:
#   pixi install
#   pixi run install-local
#
# Special packages NOT managed by pixi (require manual install):
#   - polymetis: Meta's robot controller (conda install from fair-robotics channel)
#   - pyzed: ZED SDK Python wrapper (requires ZED SDK; see https://www.stereolabs.com/docs)
#

# ──────────────────────── conda packages ────────────────────────
[dependencies]
python = "3.10.*"

# PyTorch + CUDA (from pytorch/nvidia channels)
pytorch = ">=2.0.1,<2.1"
torchvision = ">=0.15.2,<0.16"
pytorch-cuda = "11.7.*"

# Scientific computing
numpy = ">=1.26,<2"
scipy = ">=1.12"
h5py = ">=3.10"
pandas = ">=2.2"
scikit-learn = ">=1.4"
matplotlib = ">=3.8"
tqdm = ">=4.60"

# Image / video
pillow = ">=10.0"
py-opencv = ">=4.6"

# Serialization & networking
protobuf = ">=4.25"
grpcio = ">=1.62"
pyzmq = ">=25.1"
pyyaml = ">=6.0"

# ──────────────────────── pip packages ──────────────────────────
[pypi-dependencies]
# ML models
transformers = ">=4.34,<5"
huggingface-hub = ">=0.17"
einops = ">=0.7"
safetensors = ">=0.4"

# Vision / detection
open3d = ">=0.18"
supervision = ">=0.25"
dds-cloudapi-sdk = ">=0.4"

# Robotics
dm-control = ">=1.0"
dm-robotics-moma = ">=0.5"
gym = ">=0.26"
mujoco = ">=2.3"
pyquaternion = ">=0.9"

# Media
imageio = ">=2.34"
imageio-ffmpeg = ">=0.4"
simplejpeg = ">=1.8"

# Networking / IPC
zerorpc = ">=0.6"
websockets = ">=15.0"

# Misc
hidapi = ">=0.14"
ipdb = ">=0.13"

# EVA itself (editable)
eva = { path = ".", editable = true }

# ──────────────────────── tasks ─────────────────────────────────
[tasks]

# Install local editable packages (run once after `pixi install`)
install-local = """
pip install -e /home/franka/openpi-main/packages/openpi-client && \
pip install -e /home/franka/oculus_reader && \
pip install -e /home/franka/droid
"""

# Evaluation scripts
eval-aawr = "python scripts/run_eva_policy.py -c aawr_pi0 -n 10"
eval-replay = "python scripts/run_eva_policy.py -c replay_pi0 -n 10"
eval-mixed = "python scripts/run_eva_policy.py -c mixed -n 10"
